<svg width="200" height="64" viewBox="0 0 200 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">WorkHive main logo</title>
  <desc id="desc">A faceted W mark on a blue-to-violet gradient tile, followed by the WorkHive wordmark</desc>
  <defs>
    <linearGradient id="tileGradMain" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563EB" />
      <stop offset="1" stop-color="#4F2DD9" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#tileGradMain)" />
  <polygon points="12,17 25,47 32,31 39,47 52,17 43,17 32,41 21,17" fill="#FFFFFF" />
  <polygon points="32,31 39,47 32,41" fill="#BFDBFE" />
  <text x="76" y="40" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="600" fill="#111827">WorkHive</text>
</svg>
